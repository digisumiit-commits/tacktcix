[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    docker: integration test requiring a Docker daemon and sandbox image
    slow: test that takes more than 5 seconds
    cleanup: test that leaves Docker artifacts requiring cleanup
    network: test that exercises network isolation
    stress: resource-intensive stress/load test
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
addopts = -v --tb=short --strict-markers
