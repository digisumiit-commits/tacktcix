# Production deployment — single-VM Docker Compose
# Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Exposes ports 80 (frontend) and 8000 (backend API)

version: "3.9"

services:
  postgres:
    restart: always
    environment:
      POSTGRES_USER: tacktcix
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tacktcix_prod}
      POSTGRES_DB: tacktcix
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  redis:
    restart: always

  backend:
    restart: always
    environment:
      TACKTCIX_DATABASE_URL: postgresql+asyncpg://tacktcix:${DB_PASSWORD:-tacktcix_prod}@postgres:5432/tacktcix
      TACKTCIX_REDIS_URL: redis://redis:6379/0
      TACKTCIX_QDRANT_URL: http://qdrant:6333
      TACKTCIX_NEO4J_URL: bolt://neo4j:7687
      TACKTCIX_DEBUG: "false"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  frontend:
    restart: always
    ports:
      - "80:3000"
    environment:
      API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    command: npm run start

volumes:
  pgdata_prod:
