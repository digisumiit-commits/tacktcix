# Prometheus monitoring configuration for TACKTCIX
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: tacktcix
    env: ${PROMETHEUS_ENV:-staging}

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - alerts/*.yml

scrape_configs:
  - job_name: heartbeat-engine
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['heartbeat-engine:3001']
        labels:
          service: heartbeat-engine
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: tacktcix-api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
        labels:
          service: api
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: tacktcix-frontend
    metrics_path: /metrics
    static_configs:
      - targets: ['frontend:3000']
        labels:
          service: frontend

  - job_name: execution-workers
    metrics_path: /metrics
    static_configs:
      - targets: ['worker:8080']
        labels:
          service: worker

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: redis

  - job_name: postgres
    static_configs:
      - targets: ['pg-exporter:9187']
        labels:
          service: postgres

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: node
