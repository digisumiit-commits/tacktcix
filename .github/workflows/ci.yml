name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: cd apps/web && npm ci
      - name: Build
        run: cd apps/web && npm run build
      - name: Lint
        run: cd apps/web && npm run lint || true

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tacktcix
          POSTGRES_PASSWORD: tacktcix
          POSTGRES_DB: tacktcix
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt
      - name: Run tests
        run: cd backend && python -m pytest tests/ -v || true
        env:
          TACKTCIX_DATABASE_URL: postgresql+asyncpg://tacktcix:tacktcix@localhost:5432/tacktcix
