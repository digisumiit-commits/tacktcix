name: Provision PostgreSQL Database

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'PostgreSQL provider'
        required: true
        type: choice
        options: [neon, supabase]
        default: neon

jobs:
  provision-neon:
    if: github.event.inputs.provider == 'neon'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Provision Neon PostgreSQL
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          PROJECT_RESP=$(curl -sS -X POST https://console.neon.tech/api/v2/projects \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"project":{"name":"tacktcix-preview"},"branch":{}}')

          PROJECT_ID=$(echo "$PROJECT_RESP" | jq -r '.project.id')
          echo "Neon project: $PROJECT_ID"

          CONN_RESP=$(curl -sS "https://console.neon.tech/api/v2/projects/$PROJECT_ID/connection_uri" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -d '{"role":"neondb_owner","database":"neondb"}' \
            -H "Content-Type: application/json")

          DATABASE_URL=$(echo "$CONN_RESP" | jq -r '.uri')
          # Convert to asyncpg format
          DATABASE_URL_ASYNC=$(echo "$DATABASE_URL" | sed 's|^postgresql://|postgresql+asyncpg://|')
          echo "DATABASE_URL=$DATABASE_URL_ASYNC" >> $GITHUB_ENV

      - name: Run migrations
        working-directory: backend
        run: |
          pip install -r requirements.txt
          TACKTCIX_DATABASE_URL=${{ env.DATABASE_URL }} alembic upgrade head

      - name: Set Vercel environment variable
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel
          echo "${{ env.DATABASE_URL }}" | vercel env add TACKTCIX_DATABASE_URL production \
            --token=$VERCEL_TOKEN || echo "Set TACKTCIX_DATABASE_URL manually in Vercel dashboard"

  provision-supabase:
    if: github.event.inputs.provider == 'supabase'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get Supabase connection
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is not set. Create a token at https://app.supabase.com/account/tokens"
            echo "Then add it to GitHub secrets: gh secret set SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          # Use Supabase Management API to get project database details
          PROJECT_JSON=$(curl -sS -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/guhucszulzftoudirdno")
          DB_PASS=$(echo "$PROJECT_JSON" | jq -r '.database.password // empty')
          if [ -z "$DB_PASS" ]; then
            echo "Could not fetch DB password from Management API."
            echo "Reset the password at https://app.supabase.com/project/guhucszulzftoudirdno/settings/database"
            exit 1
          fi
          # Use connection pooler (session mode) for Vercel serverless compatibility
          DATABASE_URL="postgresql+asyncpg://postgres.guhucszulzftoudirdno:${DB_PASS}@aws-0-us-east-1.pooler.supabase.co:5432/postgres"
          echo "DATABASE_URL=$DATABASE_URL" >> $GITHUB_ENV

      - name: Run migrations
        working-directory: backend
        run: |
          pip install -r requirements.txt
          TACKTCIX_DATABASE_URL=${{ env.DATABASE_URL }} alembic upgrade head

      - name: Set Vercel environment variable
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel
          echo "${{ env.DATABASE_URL }}" | vercel env add TACKTCIX_DATABASE_URL production \
            --token=$VERCEL_TOKEN || echo "Set TACKTCIX_DATABASE_URL manually in Vercel dashboard"
