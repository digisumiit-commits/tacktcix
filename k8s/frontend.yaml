apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tacktcix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: tacktcix-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: API_URL
              value: http://backend:8000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: tacktcix
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
