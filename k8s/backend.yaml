apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tacktcix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: tacktcix-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: TACKTCIX_DATABASE_URL
              value: postgresql+asyncpg://tacktcix:tacktcix@postgres:5432/tacktcix
            - name: TACKTCIX_REDIS_URL
              value: redis://redis:6379/0
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: tacktcix
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
