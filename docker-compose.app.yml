version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tacktcix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      TACKTCIX_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/tacktcix
      TACKTCIX_NEO4J_URI: bolt://neo4j:7687
      TACKTCIX_NEO4J_USER: neo4j
      TACKTCIX_NEO4J_PASSWORD: password
      TACKTCIX_QDRANT_URL: http://qdrant:6333
      TACKTCIX_REDIS_URL: redis://redis:6379/0
      TACKTCIX_AI_MODEL_API_KEY: ${DEEPSEEK_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_started

  memory-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tacktcix
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      PORT: "3100"
      BACKEND_API_URL: http://backend:8000
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_MEMORY_API_URL: http://localhost:3100
    depends_on:
      - backend

volumes:
  pgdata:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
